<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Rifornimento | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); min-height: 100vh; }
        .apple-glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 3rem; }
    </style>
</head>
<body class="p-6 md:p-12 flex justify-center items-center">

<div class="max-w-xl w-full">
    <div class="mb-8 text-center">
        <h1 class="text-4xl font-extrabold text-[#102a43] italic">Modifica Dati<span class="text-blue-500">.</span></h1>
    </div>

    <form id="edit-form" class="apple-glass p-10 space-y-6">
        <div class="grid grid-cols-2 gap-5">
            <div class="col-span-2">
                <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Data Rifornimento</label>
                <input type="date" id="DataRifornimento" required class="w-full p-4 rounded-2xl text-sm font-bold bg-white/60 border border-white">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">KM Attuali</label>
                <input type="number" id="kmattuali" step="any" required class="w-full p-4 rounded-2xl text-sm font-bold bg-white/60 border border-white">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Litri Totali</label>
                <input type="number" id="totlitri" step="any" required class="w-full p-4 rounded-2xl text-sm font-bold bg-white/60 border border-white">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Importo (€)</label>
                <input type="number" id="importototale" step="any" required class="w-full p-4 rounded-2xl text-sm font-bold bg-white/60 border border-white">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Prezzo/L (€)</label>
                <input type="number" id="costolitro" step="0.001" required class="w-full p-4 rounded-2xl text-sm font-bold bg-white/60 border border-white">
            </div>
        </div>

        <div class="flex gap-4 pt-6">
            <button type="button" onclick="window.location.href='Elenco_rifornimenti.html'" class="flex-1 bg-white/50 text-slate-500 font-bold p-4 rounded-2xl text-[10px] uppercase border border-white">Annulla</button>
            <button type="submit" id="btn-salva" class="flex-[2] bg-blue-600 text-white font-black p-4 rounded-2xl text-[10px] uppercase shadow-lg shadow-blue-500/20">Salva Modifiche</button>
        </div>
    </form>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get('id');

    async function caricaDati() {
        if (!recordId) { window.location.href = 'Elenco_rifornimenti.html'; return; }
        
        const { data, error } = await supabaseClient.from('consumi').select('*').eq('id', recordId).single();
        
        if (error) { alert("Errore caricamento: " + error.message); return; }

        document.getElementById('DataRifornimento').value = data.DataRifornimento;
        document.getElementById('kmattuali').value = data.kmattuali;
        document.getElementById('totlitri').value = data.totlitri;
        document.getElementById('importototale').value = data.importototale;
        document.getElementById('costolitro').value = data.costolitro;
    }

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-salva');
        btn.innerText = "Salvataggio...";
        btn.disabled = true;

        const datiDaInviare = {
            "DataRifornimento": document.getElementById('DataRifornimento').value,
            "kmattuali": parseFloat(document.getElementById('kmattuali').value),
            "totlitri": parseFloat(document.getElementById('totlitri').value),
            "importototale": parseFloat(document.getElementById('importototale').value),
            "costolitro": parseFloat(document.getElementById('costolitro').value)
        };

        try {
            // Proviamo a forzare l'aggiornamento
            const { data, error, status } = await supabaseClient
                .from('consumi')
                .update(datiDaInviare)
                .eq('id', recordId)
                .select();

            if (error) {
                throw error;
            }

            if (status === 200 || status === 204 || data) {
                console.log("Salvataggio riuscito!");
                window.location.href = 'Elenco_rifornimenti.html';
            } else {
                alert("Il database non ha risposto correttamente. Verifica i permessi RLS.");
            }

        } catch (err) {
            console.error("Errore dettagliato:", err);
            alert("ERRORE: " + (err.message || "Errore sconosciuto durante il salvataggio"));
            btn.innerText = "Salva Modifiche";
            btn.disabled = false;
        }
    });

    window.onload = caricaDati;
</script>
</body>
</html>
