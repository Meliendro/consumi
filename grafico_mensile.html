<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Medie Mensili | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; height: 100vh; overflow: hidden; }
        .chart-wrapper { height: calc(100vh - 150px); width: 100%; padding: 20px; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black uppercase tracking-tighter text-purple-500">Storico Medie Mensili</h1>
            <p class="text-slate-500 text-xs">Confronto dei costi medi per ogni mese</p>
        </div>
        <a href="Riepilogo_statistiche.html" class="bg-slate-800 px-6 py-2 rounded-xl text-xs font-bold uppercase hover:bg-slate-700 transition-all">
            <i class="fas fa-chevron-left mr-2"></i> Indietro
        </a>
    </div>

    <div class="chart-wrapper bg-slate-900/50 rounded-[2rem] border border-slate-800">
        <canvas id="mainChart"></canvas>
    </div>

    <script>
        const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            try {
                const { data, error } = await supabaseClient
                    .from('consumi')
                    .select('DataRifornimento, costolitro')
                    .order('DataRifornimento', { ascending: true });

                if (error) throw error;

                const mensili = {};
                
                for (const row of data) {
                    const dateObj = new Date(row.DataRifornimento);
                    // Usiamo una chiave che contenga l'anno per il raggruppamento e il colore
                    const label = dateObj.toLocaleString('it-IT', { month: 'short', year: '2-digit' });
                    const anno = dateObj.getFullYear();
                    
                    if (!mensili[label]) {
                        mensili[label] = { somma: 0, count: 0, anno: anno };
                    }
                    
                    const costo = parseFloat(row.costolitro);
                    if (!isNaN(costo)) {
                        mensili[label].somma += costo;
                        mensili[label].count++;
                    }
                }

                const labels = Object.keys(mensili);
                const values = labels.map(l => (mensili[l].somma / mensili[l].count).toFixed(3));
                
                // Genera colori diversi in base all'anno
                const backgroundColors = labels.map(l => {
                    const anno = mensili[l].anno;
                    // Alterna colori tra anni (es: 2024 viola, 2025 blu, 2026 smeraldo)
                    if (anno % 3 === 0) return '#8b5cf6'; // Viola
                    if (anno % 3 === 1) return '#3b82f6'; // Blu
                    return '#10b981'; // Smeraldo
                });

                renderChart(labels, values, backgroundColors);
            } catch (err) {
                console.error("Errore caricamento dati:", err);
            }
        }

        function renderChart(labels, values, colors) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            if (window.myChart) window.myChart.destroy();

            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Media €/L',
                        data: values,
                        backgroundColor: colors,
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 12,
                            displayColors: true,
                            callbacks: {
                                label: (context) => ` Media: € ${context.raw}`
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: false,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
