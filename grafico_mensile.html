<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Medie Mensili | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; height: 100vh; overflow: hidden; }
        .chart-wrapper { height: calc(100vh - 150px); width: 100%; padding: 20px; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black uppercase tracking-tighter text-purple-500">Storico Medie Mensili</h1>
            <p class="text-slate-500 text-xs">Confronto dei costi medi per ogni mese</p>
        </div>
        <a href="Analytics_Avanzate.html" class="bg-slate-800 px-6 py-2 rounded-xl text-xs font-bold uppercase hover:bg-slate-700 transition-all">
            <i class="fas fa-chart-pie mr-2"></i> Riepilogo
        </a>
    </div>

    <div class="chart-wrapper bg-slate-900/50 rounded-[2rem] border border-slate-800">
        <canvas id="mainChart"></canvas>
    </div>

    <script>
        const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            try {
                // Fetch rapido selezionando solo le colonne necessarie
                const { data, error } = await supabaseClient
                    .from('consumi')
                    .select('DataRifornimento, costolitro')
                    .order('DataRifornimento', { ascending: true });

                if (error) throw error;

                const mensili = {};
                
                // Ottimizzazione ciclo: usiamo un ciclo for classico o for-of per performance migliori su grandi dataset
                for (const row of data) {
                    // Cache della data per evitare calcoli multipli
                    const dateObj = new Date(row.DataRifornimento);
                    const label = dateObj.toLocaleString('it-IT', { month: 'short', year: '2-digit' });
                    
                    if (!mensili[label]) {
                        mensili[label] = { somma: 0, count: 0 };
                    }
                    
                    const costo = parseFloat(row.costolitro);
                    if (!isNaN(costo)) {
                        mensili[label].somma += costo;
                        mensili[label].count++;
                    }
                }

                const labels = Object.keys(mensili);
                const values = labels.map(l => (mensili[l].somma / mensili[l].count).toFixed(3));

                renderChart(labels, values);
            } catch (err) {
                console.error("Errore caricamento dati:", err);
            }
        }

        function renderChart(labels, values) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            // Distruggiamo eventuali istanze precedenti se necessario (buona pratica)
            if (window.myChart) window.myChart.destroy();

            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Media €/L',
                        data: values,
                        backgroundColor: '#8b5cf6',
                        borderRadius: 10,
                        borderSkipped: false,
                        hoverBackgroundColor: '#a78bfa'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1000,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: (context) => `Media: € ${context.raw}`
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: false,
                            grid: { color: 'rgba(30, 41, 59, 0.5)', drawBorder: false },
                            ticks: { color: '#64748b', font: { size: 11 } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#64748b', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
