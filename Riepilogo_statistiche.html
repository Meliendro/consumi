<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riepilogo Mensile | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc; min-height: 100vh;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .section-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; letter-spacing: 0.2em; }
    </style>
</head>
<body class="p-6 md:p-12">

<div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-12">
        <div>
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">Report <span class="text-blue-500">Analitico</span></h1>
            <p class="text-slate-500 text-sm">Analisi temporale dei consumi</p>
        </div>
        <a href="Elenco_rifornimenti.html" class="apple-glass px-6 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-white/10 transition-all">
            <i class="fas fa-arrow-left mr-2"></i> Elenco
        </a>
    </div>

    <div class="mb-16">
        <h2 class="section-title mb-6">Analisi Mensile</h2>
        <div id="container-mensile" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <div>
        <h2 class="section-title mb-6">Riepilogo Annuale</h2>
        <div id="container-annuale" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <div id="loader" class="text-center py-20">
        <i class="fas fa-circle-notch fa-spin text-blue-500 text-4xl"></i>
    </div>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function loadStats() {
        try {
            const { data, error } = await supabaseClient
                .from('consumi')
                .select('*')
                .order('DataRifornimento', { ascending: true });

            if (error) throw error;
            processData(data);
        } catch (err) {
            console.error(err);
        } finally {
            document.getElementById('loader').classList.add('hidden');
        }
    }

    function processData(data) {
        const statsMensili = {};
        const statsAnnuali = {};

        data.forEach((item, index) => {
            const d = new Date(item.DataRifornimento);
            const meseAnno = d.toLocaleString('it-IT', { month: 'long', year: 'numeric' });
            const anno = d.getFullYear();

            // Calcolo KM percorsi (differenza col record precedente se esiste)
            let kmPercorsi = 0;
            if (index > 0) {
                kmPercorsi = item.kmattuali - data[index-1].kmattuali;
            }

            // Raggruppamento Mensile
            if (!statsMensili[meseAnno]) {
                statsMensili[meseAnno] = { spesa: 0, litri: 0, km: 0, count: 0 };
            }
            statsMensili[meseAnno].spesa += item.importototale;
            statsMensili[meseAnno].litri += item.totlitri;
            statsMensili[meseAnno].km += kmPercorsi;
            statsMensili[meseAnno].count++;

            // Raggruppamento Annuale
            if (!statsAnnuali[anno]) {
                statsAnnuali[anno] = { spesa: 0, litri: 0, km: 0, count: 0 };
            }
            statsAnnuali[anno].spesa += item.importototale;
            statsAnnuali[anno].litri += item.totlitri;
            statsAnnuali[anno].km += kmPercorsi;
            statsAnnuali[anno].count++;
        });

        renderCharts(statsMensili, 'container-mensile', true);
        renderCharts(statsAnnuali, 'container-annuale', false);
    }

    function renderCharts(obj, containerId, isMonthly) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        Object.keys(obj).reverse().forEach(key => {
            const s = obj[key];
            const mediaPrezzo = (s.spesa / s.litri).toFixed(3);
            const consumoMedio = s.km > 0 ? (s.km / s.litri).toFixed(2) : "N/D";

            container.innerHTML += `
                <div class="apple-glass p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <h3 class="text-xl font-bold text-white capitalize">${key}</h3>
                        <p class="text-xs text-slate-500">${s.count} rifornimenti registrati</p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-8 w-full md:w-auto">
                        <div>
                            <p class="text-[9px] font-black text-blue-500 uppercase">Spesa</p>
                            <p class="text-lg font-black text-white">€ ${s.spesa.toFixed(2)}</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-black text-emerald-500 uppercase">Litri</p>
                            <p class="text-lg font-bold text-slate-300">${s.litri.toFixed(1)} L</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-black text-amber-500 uppercase">KM Percorsi</p>
                            <p class="text-lg font-bold text-slate-300">${s.km} KM</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-black text-purple-500 uppercase">Media €/L</p>
                            <p class="text-lg font-bold text-slate-300">€ ${mediaPrezzo}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    window.onload = loadStats;
</script>

</body>
</html>
