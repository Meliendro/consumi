<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Avanzate | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc; min-height: 100vh;
            scroll-behavior: smooth;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .section-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; letter-spacing: 0.2em; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row items-center justify-between mb-12 gap-6">
        <div>
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">Report <span class="text-blue-500 text-5xl">.</span>Analitico</h1>
            <p class="text-slate-500 text-sm font-medium">Data Visualization & Performance KM</p>
        </div>
        <a href="Elenco_rifornimenti.html" class="apple-glass px-6 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-blue-600/20 hover:border-blue-500/50 transition-all flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Torna alla Lista
        </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-16">
        <div class="apple-glass p-6 rounded-[2.5rem]">
            <h2 class="section-title mb-4 flex items-center text-[10px]">
                <i class="fas fa-gas-pump mr-2 text-blue-500"></i> Costo €/L (Trend)
            </h2>
            <div class="chart-container">
                <canvas id="chartPuntuale"></canvas>
            </div>
        </div>

        <div class="apple-glass p-6 rounded-[2.5rem] lg:col-span-1">
            <h2 class="section-title mb-4 flex items-center text-[10px]">
                <i class="fas fa-road mr-2 text-emerald-500"></i> Progressione & Parziali KM
            </h2>
            <div class="chart-container">
                <canvas id="chartKm"></canvas>
            </div>
        </div>

        <div class="apple-glass p-6 rounded-[2.5rem]">
            <h2 class="section-title mb-4 flex items-center text-[10px]">
                <i class="fas fa-chart-bar mr-2 text-purple-500"></i> Media Mensile €/L
            </h2>
            <div class="chart-container">
                <canvas id="chartMensile"></canvas>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-12">
        <div>
            <h2 class="section-title mb-6 px-4">Dettaglio Mensile</h2>
            <div id="container-mensile" class="grid grid-cols-1 gap-4"></div>
        </div>
        <div>
            <h2 class="section-title mb-6 px-4">Consolidato Annuale</h2>
            <div id="container-annuale" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-[#0f172a] flex flex-col items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Analisi chilometrica in corso...</p>
    </div>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function loadStats() {
        try {
            const { data, error } = await supabaseClient
                .from('consumi')
                .select('*')
                .order('DataRifornimento', { ascending: true });

            if (error) throw error;
            processData(data);
            initCharts(data);
        } catch (err) {
            console.error(err);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function processData(data) {
        if (!data || data.length === 0) return;
        const statsMensili = {};
        const statsAnnuali = {};

        data.forEach((item) => {
            const d = new Date(item.DataRifornimento);
            const monthKey = d.getFullYear() + "-" + (d.getMonth() + 1).toString().padStart(2, '0');
            const meseAnno = d.toLocaleString('it-IT', { month: 'long', year: 'numeric' });
            const anno = d.getFullYear();

            if (!statsMensili[monthKey]) statsMensili[monthKey] = { label: meseAnno, spesa: 0, litri: 0, count: 0 };
            statsMensili[monthKey].spesa += (parseFloat(item.importototale) || 0);
            statsMensili[monthKey].litri += (parseFloat(item.totlitri) || 0);
            statsMensili[monthKey].count++;

            if (!statsAnnuali[anno]) statsAnnuali[anno] = { label: anno, spesa: 0, litri: 0, count: 0 };
            statsAnnuali[anno].spesa += (parseFloat(item.importototale) || 0);
            statsAnnuali[anno].litri += (parseFloat(item.totlitri) || 0);
            statsAnnuali[anno].count++;
        });

        renderList(statsMensili, 'container-mensile');
        renderList(statsAnnuali, 'container-annuale');
    }

    function initCharts(data) {
        const labelsP = data.map(i => new Date(i.DataRifornimento).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'}));

        // --- 1. GRAFICO PREZZO PUNTUALE ---
        new Chart(document.getElementById('chartPuntuale'), {
            type: 'line',
            data: {
                labels: labelsP,
                datasets: [{
                    data: data.map(i => i.costolitro),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true, tension: 0.3, pointRadius: 3
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 } } }
                }
            }
        });

        // --- 2. GRAFICO PROGRESSIONE KM (DOPPIA LINEA) ---
        const valuesKmParziali = data.map((item, index) => {
            if (index === 0) return 0;
            const diff = (parseInt(item.kmattuali) || 0) - (parseInt(data[index-1].kmattuali) || 0);
            return diff > 0 ? diff : 0;
        });

        const valuesKmTotali = data.map(i => parseInt(i.kmattuali) || 0);

        new Chart(document.getElementById('chartKm'), {
            type: 'line',
            data: {
                labels: labelsP,
                datasets: [
                    {
                        label: 'KM Parziali',
                        data: valuesKmParziali,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4,
                        yAxisID: 'y'
                    },
                    {
                        label: 'KM Totali Prog.',
                        data: valuesKmTotali,
                        borderColor: '#f59e0b',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.2,
                        pointRadius: 0,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { display: true, labels: { color: '#64748b', size: 10, boxWidth: 10 } } 
                },
                scales: {
                    y: {
                        position: 'left',
                        title: { display: true, text: 'Parziali', color: '#10b981', font: { size: 10 } },
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#10b981' }
                    },
                    y1: {
                        position: 'right',
                        title: { display: true, text: 'Totali', color: '#f59e0b', font: { size: 10 } },
                        grid: { display: false },
                        ticks: { color: '#f59e0b' }
                    },
                    x: { ticks: { color: '#64748b', font: { size: 9 } } }
                }
            }
        });

        // --- 3. GRAFICO MEDIA MENSILE ---
        const mensili = {};
        data.forEach(i => {
            const m = new Date(i.DataRifornimento).toLocaleString('it-IT', {month:'short', year:'2-digit'});
            if(!mensili[m]) mensili[m] = { somma: 0, count: 0 };
            mensili[m].somma += (parseFloat(i.costolitro) || 0);
            mensili[m].count++;
        });
        const labelsM = Object.keys(mensili);
        
        new Chart(document.getElementById('chartMensile'), {
            type: 'bar',
            data: {
                labels: labelsM,
                datasets: [{
                    data: labelsM.map(l => (mensili[l].somma / mensili[l].count).toFixed(3)),
                    backgroundColor: '#8b5cf6', borderRadius: 6
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { ticks: { color: '#64748b' } }
                }
            }
        });
    }

    function renderList(obj, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        Object.keys(obj).sort().reverse().forEach(key => {
            const s = obj[key];
            const mediaPrezzo = (s.spesa / (s.litri || 1)).toFixed(3);
            container.innerHTML += `
                <div class="apple-glass p-6 rounded-[2rem] flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 transition-all hover:bg-white/[0.05]">
                    <div class="min-w-[180px]">
                        <h3 class="text-xl font-black text-white capitalize">${s.label}</h3>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${s.count} Pieni</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full">
                        <div>
                            <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">Spesa</p>
                            <p class="text-xl font-black text-white">€ ${s.spesa.toFixed(2)}</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-1">Litri</p>
                            <p class="text-xl font-bold text-slate-200">${s.litri.toFixed(1)} L</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-black text-purple-500 uppercase tracking-widest mb-1">Media</p>
                            <p class="text-xl font-bold text-slate-200">€ ${mediaPrezzo}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    window.onload = loadStats;
</script>

</body>
</html>
