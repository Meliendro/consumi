<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Avanzate | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc; min-height: 100vh;
            scroll-behavior: smooth;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .section-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; letter-spacing: 0.2em; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        
        /* Stile Accordion */
        .year-group { margin-bottom: 1rem; }
        .year-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.3s;
        }
        .year-header:hover { background: rgba(59, 130, 246, 0.2); }
        .months-container {
            display: none;
            padding-top: 1rem;
            flex-direction: column;
            gap: 0.75rem;
        }
        .year-group.active .months-container { display: flex; }
        .year-group.active .chevron { transform: rotate(180deg); }
        .chevron { transition: transform 0.3s; }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row items-center justify-between mb-12 gap-6">
        <div>
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">Report <span class="text-blue-500 text-5xl">.</span>Analitico</h1>
            <p class="text-slate-500 text-sm font-medium">Data Visualization & Performance KM</p>
        </div>
        <div class="flex gap-3">
             <a href="Elenco_rifornimenti.html" class="apple-glass px-6 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-blue-600/20 hover:border-blue-500/50 transition-all flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Lista
            </a>
        </div>
    </div>

    <div class="flex flex-wrap gap-4 mb-8">
        <a href="grafico_prezzi.html" class="apple-glass px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider hover:bg-blue-500/20 transition-all">Analisi Prezzi <i class="fas fa-external-link-alt ml-1"></i></a>
        <a href="grafico_km.html" class="apple-glass px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider hover:bg-emerald-500/20 transition-all">Analisi KM <i class="fas fa-external-link-alt ml-1"></i></a>
        <a href="grafico_mensile.html" class="apple-glass px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider hover:bg-purple-500/20 transition-all">Analisi Mensile <i class="fas fa-external-link-alt ml-1"></i></a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-16">
        <div class="apple-glass p-6 rounded-[2.5rem] relative">
            <h2 class="section-title mb-4 flex items-center text-[10px]"><i class="fas fa-gas-pump mr-2 text-blue-500"></i> Costo €/L (Trend)</h2>
            <div class="chart-container"><canvas id="chartPuntuale"></canvas></div>
        </div>
        <div class="apple-glass p-6 rounded-[2.5rem] relative">
            <h2 class="section-title mb-4 flex items-center text-[10px]"><i class="fas fa-road mr-2 text-emerald-500"></i> Progressione KM</h2>
            <div class="chart-container"><canvas id="chartKm"></canvas></div>
        </div>
        <div class="apple-glass p-6 rounded-[2.5rem] relative">
            <h2 class="section-title mb-4 flex items-center text-[10px]"><i class="fas fa-chart-bar mr-2 text-purple-500"></i> Media Mensile</h2>
            <div class="chart-container"><canvas id="chartMensile"></canvas></div>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-12">
        <div>
            <h2 class="section-title mb-6 px-4">Dettaglio Storico (Mensile per Anno)</h2>
            <div id="container-mensile-raggruppato"></div>
        </div>
        
        <div>
            <h2 class="section-title mb-6 px-4">Consolidato Annuale</h2>
            <div id="container-annuale" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-[#0f172a] flex flex-col items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Analisi dati in corso...</p>
    </div>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function loadStats() {
        try {
            const { data, error } = await supabaseClient.from('consumi').select('*').order('DataRifornimento', { ascending: true });
            if (error) throw error;
            processData(data);
            initCharts(data);
        } catch (err) { console.error(err); }
        finally { document.getElementById('loader').style.display = 'none'; }
    }

    function processData(data) {
        if (!data || data.length === 0) return;
        
        const raggruppamento = {}; // Per l'accordion: Anno -> Mesi
        const statsAnnuali = {};

        data.forEach((item) => {
            const d = new Date(item.DataRifornimento);
            const anno = d.getFullYear();
            const monthKey = d.getFullYear() + "-" + (d.getMonth() + 1).toString().padStart(2, '0');
            const meseLabel = d.toLocaleString('it-IT', { month: 'long' });

            // Inizializza anno se non esiste
            if (!raggruppamento[anno]) raggruppamento[anno] = {};
            
            // Inizializza mese nell'anno
            if (!raggruppamento[anno][monthKey]) {
                raggruppamento[anno][monthKey] = { label: meseLabel, spesa: 0, litri: 0, count: 0 };
            }
            
            raggruppamento[anno][monthKey].spesa += (parseFloat(item.importototale) || 0);
            raggruppamento[anno][monthKey].litri += (parseFloat(item.totlitri) || 0);
            raggruppamento[anno][monthKey].count++;

            // Stats Annuali
            if (!statsAnnuali[anno]) {
                statsAnnuali[anno] = { label: anno, spesa: 0, litri: 0, count: 0, firstKm: null, lastKm: 0 };
            }
            statsAnnuali[anno].spesa += (parseFloat(item.importototale) || 0);
            statsAnnuali[anno].litri += (parseFloat(item.totlitri) || 0);
            statsAnnuali[anno].count++;
            
            const km = parseInt(item.kmattuali) || 0;
            if (statsAnnuali[anno].firstKm === null) statsAnnuali[anno].firstKm = km;
            statsAnnuali[anno].lastKm = km;
        });

        Object.keys(statsAnnuali).forEach(a => statsAnnuali[a].kmPercorsi = statsAnnuali[a].lastKm - statsAnnuali[a].firstKm);

        renderAccordion(raggruppamento);
        renderAnnualList(statsAnnuali);
    }

    function renderAccordion(raggruppamento) {
        const container = document.getElementById('container-mensile-raggruppato');
        container.innerHTML = '';

        // Ordina anni decrescente
        Object.keys(raggruppamento).sort().reverse().forEach(anno => {
            const mesi = raggruppamento[anno];
            const yearBox = document.createElement('div');
            yearBox.className = 'year-group';
            
            let mesiHtml = '';
            // Ordina mesi decrescente
            Object.keys(mesi).sort().reverse().forEach(mKey => {
                const s = mesi[mKey];
                const mediaMese = (s.spesa / (s.litri || 1)).toFixed(3);
                mesiHtml += `
                    <div class="apple-glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-500">
                        <div class="w-1/4"><p class="font-bold text-white capitalize">${s.label}</p></div>
                        <div class="flex-1 grid grid-cols-3 gap-2 text-right">
                            <div><p class="text-[8px] text-slate-500 uppercase">Spesa</p><p class="text-xs font-bold">€${s.spesa.toFixed(2)}</p></div>
                            <div><p class="text-[8px] text-slate-500 uppercase">Litri</p><p class="text-xs font-bold">${s.litri.toFixed(1)}L</p></div>
                            <div><p class="text-[8px] text-slate-500 uppercase">Media</p><p class="text-xs font-bold">€${mediaMese}</p></div>
                        </div>
                    </div>`;
            });

            yearBox.innerHTML = `
                <div class="year-header" onclick="this.parentElement.classList.toggle('active')">
                    <div class="flex items-center gap-4">
                        <span class="text-2xl font-black text-white">${anno}</span>
                        <span class="text-[10px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full uppercase tracking-widest font-bold">
                            ${Object.keys(mesi).length} Mesi
                        </span>
                    </div>
                    <i class="fas fa-chevron-down chevron text-slate-500"></i>
                </div>
                <div class="months-container">${mesiHtml}</div>
            `;
            container.appendChild(yearBox);
        });
    }

    function renderAnnualList(obj) {
        const container = document.getElementById('container-annuale');
        container.innerHTML = '';
        Object.keys(obj).sort().reverse().forEach(key => {
            const s = obj[key];
            const media = (s.spesa / (s.litri || 1)).toFixed(3);
            const kmL = s.litri > 0 ? (s.kmPercorsi / s.litri).toFixed(2) : 0;
            
            container.innerHTML += `
                <div class="apple-glass p-6 rounded-[2rem] border-t-2 border-emerald-500/30">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div>
                            <h3 class="text-2xl font-black text-white">${s.label}</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${s.count} Rifornimenti</p>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 w-full md:w-auto text-center md:text-left">
                            <div><p class="text-[9px] font-black text-blue-500 uppercase mb-1">Spesa Totale</p><p class="text-xl font-black">€${s.spesa.toFixed(2)}</p></div>
                            <div><p class="text-[9px] font-black text-orange-500 uppercase mb-1">KM Percorsi</p><p class="text-xl font-bold">${s.kmPercorsi.toLocaleString()} KM</p></div>
                            <div><p class="text-[9px] font-black text-cyan-400 uppercase mb-1">Efficienza</p><p class="text-xl font-bold">${kmL} km/L</p></div>
                            <div><p class="text-[9px] font-black text-purple-500 uppercase mb-1">Prezzo Medio</p><p class="text-xl font-bold">€${media}</p></div>
                        </div>
                    </div>
                </div>`;
        });
    }

    // Grafici (logica semplificata mantenendo la tua base)
    function initCharts(data) {
        const labelsP = data.map(i => new Date(i.DataRifornimento).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'}));
        
        new Chart(document.getElementById('chartPuntuale'), {
            type: 'line',
            data: {
                labels: labelsP,
                datasets: [{ data: data.map(i => i.costolitro), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b' } }, x: { ticks: { color: '#64748b', font: { size: 9 } } } } }
        });

        new Chart(document.getElementById('chartKm'), {
            type: 'line',
            data: {
                labels: labelsP,
                datasets: [{ label: 'Contachilometri', data: data.map(i => i.kmattuali), borderColor: '#10b981', tension: 0.4 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b' } }, x: { ticks: { color: '#64748b', font: { size: 9 } } } } }
        });

        // Grafico media mensile (ultimi 12 mesi)
        const mensili = {};
        data.forEach(i => {
            const m = new Date(i.DataRifornimento).toLocaleString('it-IT', {month:'short', year:'2-digit'});
            if(!mensili[m]) mensili[m] = { somma: 0, count: 0 };
            mensili[m].somma += (parseFloat(i.costolitro) || 0);
            mensili[m].count++;
        });
        const labelsM = Object.keys(mensili).slice(-12);
        new Chart(document.getElementById('chartMensile'), {
            type: 'bar',
            data: {
                labels: labelsM,
                datasets: [{ data: labelsM.map(l => (mensili[l].somma / mensili[l].count).toFixed(3)), backgroundColor: '#8b5cf6', borderRadius: 6 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    window.onload = loadStats;
</script>

</body>
</html>
