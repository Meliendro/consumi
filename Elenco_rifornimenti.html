<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Consumi Auto | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #334e68; 
            margin: 0;
            min-height: 100vh;
        }

        .apple-glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .stats-card {
            background: white;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08); }

        .btn-action {
            width: 34px; height: 34px;
            display: inline-flex; items-center; justify-center;
            border-radius: 10px; transition: all 0.2s;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glass-border);
        }

        .month-divider {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
        <div>
            <span class="text-blue-600 font-bold tracking-[0.3em] text-[10px] uppercase">Registro Veicolo</span>
            <h1 class="text-5xl font-extrabold text-[#102a43] tracking-tighter italic">
                Meliendro <span class="text-blue-500 text-6xl">.</span>
            </h1>
        </div>
        
        <div class="flex flex-wrap gap-3">
            <button onclick="window.location.href='Inserisci_rifornimento.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl shadow-blue-500/20 flex items-center">
                <i class="fas fa-plus-circle mr-3 text-lg"></i> Nuovo
            </button>
            
            <button onclick="window.location.href='Riepilogo_statistiche.html'" class="apple-glass text-blue-600 hover:bg-white/50 px-6 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all flex items-center">
                <i class="fas fa-chart-line mr-2 text-lg"></i> Statistiche
            </button>

            <button onclick="fetchConsumi()" class="apple-glass text-slate-500 hover:bg-white/50 px-5 py-4 rounded-2xl transition-all">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>

    <div id="stats-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12"></div>

    <div class="apple-glass rounded-[2.5rem] overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/30 border-b border-white/50">
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Data</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Chilometri</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Litri</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Importo</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Prezzo/L</th>
                        <th class="p-6 text-right text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Gestione</th>
                    </tr>
                </thead>
                <tbody id="tabella-corpo"></tbody>
            </table>
        </div>
    </div>
    
    <div id="loading-state" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-blue-600 mb-4"></div>
        <p class="text-slate-400 font-bold uppercase text-[9px] tracking-[0.3em]">Accesso Supabase...</p>
    </div>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function fetchConsumi() {
        const corpo = document.getElementById('tabella-corpo');
        const loader = document.getElementById('loading-state');
        corpo.innerHTML = '';
        loader.classList.remove('hidden');

        try {
            const { data, error } = await supabaseClient
                .from('consumi')
                .select('*')
                .order('DataRifornimento', { ascending: false }); // Ordinamento Decrescente

            if (error) throw error;
            renderTable(data);
            renderStats(data);
        } catch (err) {
            console.error(err.message);
        } finally {
            loader.classList.add('hidden');
        }
    }

    function renderTable(lista) {
        const corpo = document.getElementById('tabella-corpo');
        let currentMonth = "";

        const insertMonthlySummary = (label, dataArr) => {
            if (dataArr.length === 0) return;
            
            const spesaMese = dataArr.reduce((a, b) => a + (b.importototale || 0), 0);
            const litriMese = dataArr.reduce((a, b) => a + (b.totlitri || 0), 0);
            const kms = dataArr.map(o => o.kmattuali || 0);
            const kmMese = Math.max(...kms) - Math.min(...kms);
            const mediaMese = (spesaMese / (litriMese || 1)).toFixed(3);

            corpo.innerHTML += `
                <tr class="month-divider">
                    <td colspan="6" class="p-4 px-6">
                        <div class="flex flex-wrap items-center justify-between gap-4">
                            <span class="text-blue-600 font-extrabold uppercase tracking-widest text-xs">${label}</span>
                            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-tighter">
                                <span>Spesa: <span class="text-slate-800">€${spesaMese.toFixed(2)}</span></span>
                                <span>Litri: <span class="text-slate-800">${litriMese.toFixed(1)}L</span></span>
                                <span>Dist: <span class="text-slate-800">${kmMese}km</span></span>
                                <span>Media: <span class="text-slate-800">€${mediaMese}/L</span></span>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        };

        lista.forEach((item) => {
            const d = new Date(item.DataRifornimento);
            const monthLabel = d.toLocaleString('it-IT', { month: 'long', year: 'numeric' });
            const dataF = d.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit', year:'2-digit'});

            if (monthLabel !== currentMonth) {
                currentMonth = monthLabel;
                const recordsDelMese = lista.filter(x => 
                    new Date(x.DataRifornimento).toLocaleString('it-IT', { month: 'long', year: 'numeric' }) === monthLabel
                );
                insertMonthlySummary(monthLabel, recordsDelMese);
            }
            
            corpo.innerHTML += `
                <tr class="hover:bg-white/40 transition-colors border-b border-white/20">
                    <td class="p-6 text-sm font-bold text-[#243b53]">${dataF}</td>
                    <td class="p-6 text-sm font-mono text-blue-600 font-bold">${item.kmattuali?.toLocaleString()} <span class="text-[9px] text-slate-400 font-normal ml-1 uppercase">KM</span></td>
                    <td class="p-6 text-sm text-slate-600 font-semibold">${item.totlitri} <span class="text-[9px] text-slate-400 uppercase font-normal">L</span></td>
                    <td class="p-6 text-sm font-black text-emerald-600">€ ${item.importototale?.toFixed(2)}</td>
                    <td class="p-6 text-xs text-slate-400 font-medium italic">€ ${item.costolitro?.toFixed(3)}</td>
                    <td class="p-6 text-right space-x-2">
                        <button onclick="window.location.href='Modifica_rifornimento.html?id=${item.id}'" class="btn-action hover:bg-blue-50 hover:text-blue-500 text-slate-400 border-transparent">
                            <i class="fas fa-pen text-[10px]"></i>
                        </button>
                        <button onclick="elimina(${item.id})" class="btn-action hover:bg-red-50 hover:text-red-500 text-slate-400 border-transparent">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    async function elimina(id) {
        if(confirm("Vuoi rimuovere questo rifornimento?")) {
            const { error } = await supabaseClient.from('consumi').delete().eq('id', id);
            if (!error) fetchConsumi();
        }
    }

    function renderStats(lista) {
        const container = document.getElementById('stats-container');
        if (!lista.length) return;

        const spesa = lista.reduce((a, b) => a + (b.importototale || 0), 0);
        const litri = lista.reduce((a, b) => a + (b.totlitri || 0), 0);
        const kms = lista.map(o => o.kmattuali || 0);
        const kmMax = Math.max(...kms);
        const kmMin = Math.min(...kms);

        const cards = [
            { label: 'Spesa Totale', val: '€ ' + spesa.toLocaleString('it-IT', {minimumFractionDigits: 2}), color: '#3b82f6' },
            { label: 'Litri Totali', val: litri.toFixed(1) + ' L', color: '#10b981' },
            { label: 'Distanza', val: (kmMax - kmMin).toLocaleString() + ' KM', color: '#f59e0b' },
            { label: 'Media/L', val: '€ ' + (spesa / (litri || 1)).toFixed(3), color: '#8b5cf6' }
        ];

        container.innerHTML = cards.map(c => `
            <div class="stats-card p-7 rounded-[2rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${c.label}</p>
                <h2 class="text-2xl font-black" style="color: ${c.color}">${c.val}</h2>
            </div>
        `).join('');
    }

    window.onload = fetchConsumi;
</script>

</body>
</html>
