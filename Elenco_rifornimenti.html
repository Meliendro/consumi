<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Consumi Auto | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc; 
            margin: 0;
            min-height: 100 screen;
        }

        .apple-glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }

        .stats-card:hover { transform: translateY(-5px); }

        .row-hover { transition: all 0.2s ease; }
        .row-hover:hover { background: rgba(255, 255, 255, 0.05); }

        .btn-action {
            width: 32px; height: 32px;
            display: inline-flex; items-center; justify-center;
            border-radius: 8px; transition: all 0.2s;
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
        <div>
            <span class="text-blue-500 font-bold tracking-[0.3em] text-[10px] uppercase">Dashboard Veicolo</span>
            <h1 class="text-5xl font-extrabold text-white tracking-tighter italic">
                Meliendro <span class="text-blue-500 text-6xl">.</span>
            </h1>
        </div>
        
        <div class="flex flex-wrap gap-3">
            <button onclick="window.location.href='Inserisci_rifornimento.html'" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-2xl shadow-blue-900/40 flex items-center">
                <i class="fas fa-plus-circle mr-3 text-lg"></i> Nuovo Rifornimento
            </button>
            <button onclick="fetchConsumi()" class="apple-glass hover:bg-white/10 text-white px-6 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all">
                <i class="fas fa-redo-alt"></i>
            </button>
        </div>
    </div>

    <div id="stats-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
        </div>

    <div class="apple-glass rounded-[2.5rem] overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/5 bg-white/5">
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Data</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Odissea KM</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Litri</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Totale</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Prezzo/L</th>
                        <th class="p-6 text-right text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabella-corpo" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>
    
    <div id="loading-state" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
        <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest">Sincronizzazione Cloud...</p>
    </div>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function fetchConsumi() {
        const corpo = document.getElementById('tabella-corpo');
        const loader = document.getElementById('loading-state');
        corpo.innerHTML = '';
        loader.classList.remove('hidden');

        try {
            const { data, error } = await supabaseClient
                .from('consumi')
                .select('*')
                .order('DataRifornimento', { ascending: false });

            if (error) throw error;
            renderTable(data);
            renderStats(data);
        } catch (err) {
            console.error("Errore Database:", err.message);
        } finally {
            loader.classList.add('hidden');
        }
    }

    function renderTable(lista) {
        const corpo = document.getElementById('tabella-corpo');
        lista.forEach(item => {
            const dataF = item.DataRifornimento ? new Date(item.DataRifornimento).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit', year:'2-digit'}) : '--';
            
            corpo.innerHTML += `
                <tr class="row-hover">
                    <td class="p-6 text-sm font-semibold text-white/90">${dataF}</td>
                    <td class="p-6 text-sm font-mono text-blue-400 font-bold">${item.kmattuali?.toLocaleString()} <span class="text-[9px] opacity-40 ml-1">KM</span></td>
                    <td class="p-6 text-sm text-slate-300">${item.totlitri} <span class="text-[9px] opacity-40">L</span></td>
                    <td class="p-6 text-sm font-black text-emerald-400">€ ${item.importototale?.toFixed(2)}</td>
                    <td class="p-6 text-xs text-slate-500 italic">€ ${item.costolitro?.toFixed(3)}</td>
                    <td class="p-6 text-right space-x-2">
                        <button onclick="modifica(${item.id})" class="btn-action bg-white/5 hover:bg-blue-500/20 text-blue-400">
                            <i class="fas fa-pen text-xs"></i>
                        </button>
                        <button onclick="elimina(${item.id})" class="btn-action bg-white/5 hover:bg-red-500/20 text-red-400">
                            <i class="fas fa-trash text-xs"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    async function elimina(id) {
        if(confirm("Sei sicuro di voler eliminare questo record?")) {
            const { error } = await supabaseClient.from('consumi').delete().eq('id', id);
            if (!error) fetchConsumi();
            else alert("Errore durante l'eliminazione");
        }
    }

    function modifica(id) {
        // Implementazione futura: apri pagina modifica con ID
        alert("Funzione modifica ID #" + id + " in arrivo!");
    }

    function renderStats(lista) {
        const container = document.getElementById('stats-container');
        if (!lista.length) return;

        const spesa = lista.reduce((a, b) => a + (b.importototale || 0), 0);
        const litri = lista.reduce((a, b) => a + (b.totlitri || 0), 0);
        const kmMax = Math.max(...lista.map(o => o.kmattuali || 0));
        const kmMin = Math.min(...lista.map(o => o.kmattuali || 0));

        const cards = [
            { label: 'Spesa Totale', val: '€ ' + spesa.toFixed(2), color: 'border-blue-500' },
            { label: 'Litri Caricati', val: litri.toFixed(1) + ' L', color: 'border-emerald-500' },
            { label: 'KM Percorsi', val: (kmMax - kmMin).toLocaleString() + ' KM', color: 'border-amber-500' },
            { label: 'Media Prezzo', val: '€ ' + (spesa/litri).toFixed(3) + '/L', color: 'border-purple-500' }
        ];

        container.innerHTML = cards.map(c => `
            <div class="stats-card p-8 rounded-[2rem] border-t-4 ${c.color}">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2">${c.label}</p>
                <h2 class="text-2xl font-black text-white">${c.val}</h2>
            </div>
        `).join('');
    }

    window.onload = fetchConsumi;
</script>

</body>
</html>
