<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Consumi Auto | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #334e68; 
            margin: 0;
            min-height: 100vh;
        }

        .apple-glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .btn-mgmt {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .btn-edit { color: #3b82f6; }
        .btn-edit:hover { 
            background: #3b82f6; 
            color: white; 
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-delete { color: #ef4444; }
        .btn-delete:hover { 
            background: #ef4444; 
            color: white; 
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .month-summary-row {
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .month-summary-row:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        .month-pill {
            background: white;
            padding: 8px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .month-label {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1e293b;
            text-transform: capitalize;
            letter-spacing: -0.02em;
        }

        .month-stat-val {
            font-size: 1.1rem;
            font-weight: 800;
            display: block;
            line-height: 1;
        }

        .month-stat-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 2px;
            display: block;
        }

        .row-hidden { display: none; }
        .chevron-rotate { transition: transform 0.3s; }
        .collapsed .chevron-rotate { transform: rotate(-90deg); }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
        <div>
            <span class="text-blue-600 font-bold tracking-[0.3em] text-[10px] uppercase">Registro Veicolo</span>
            <h1 class="text-5xl font-extrabold text-[#102a43] tracking-tighter italic">
                Meliendro <span class="text-blue-500 text-6xl">.</span>
            </h1>
        </div>
        
        <div class="flex flex-wrap gap-3">
            <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl shadow-emerald-500/20 flex items-center">
                <i class="fas fa-file-excel mr-3 text-lg"></i> Esporta Excel
            </button>

            <button onclick="window.location.href='Inserisci_rifornimento.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl shadow-blue-500/20 flex items-center">
                <i class="fas fa-plus-circle mr-3 text-lg"></i> Nuovo
            </button>
            
            <button onclick="window.location.href='Riepilogo_statistiche.html'" class="apple-glass text-blue-600 hover:bg-white/50 px-6 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all flex items-center">
                <i class="fas fa-chart-line mr-2 text-lg"></i> Statistiche
            </button>

            <button onclick="fetchConsumi()" class="apple-glass text-slate-500 hover:bg-white/50 px-5 py-4 rounded-2xl transition-all">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </div>

    <div id="stats-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12"></div>

    <div class="apple-glass rounded-[2.5rem] overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="main-table">
                <thead>
                    <tr class="bg-white/30 border-b border-white/50">
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Data</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Chilometri</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Litri</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Importo</th>
                        <th class="p-6 text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Prezzo/L</th>
                        <th class="p-6 text-right text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Gestione</th>
                    </tr>
                </thead>
                <tbody id="tabella-corpo"></tbody>
            </table>
        </div>
    </div>
    
    <div id="loading-state" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-blue-600 mb-4"></div>
        <p class="text-slate-400 font-bold uppercase text-[9px] tracking-[0.3em]">Caricamento dati...</p>
    </div>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let lastFetchedData = [];

    // Helper per formattare i KM (senza decimali, punto come separatore migliaia)
    function formatKM(val) {
        if (!val && val !== 0) return "-";
        return Math.round(val).toLocaleString('it-IT', { maximumFractionDigits: 0 });
    }

    async function fetchConsumi() {
        const corpo = document.getElementById('tabella-corpo');
        const loader = document.getElementById('loading-state');
        corpo.innerHTML = '';
        loader.classList.remove('hidden');

        try {
            const { data, error } = await supabaseClient
                .from('consumi')
                .select('*')
                .order('DataRifornimento', { ascending: true });

            if (error) throw error;
            
            lastFetchedData = data;
            const dataVisualizzazione = [...data].reverse();
            renderTable(dataVisualizzazione, data);
            renderStats(data);
        } catch (err) {
            console.error(err.message);
        } finally {
            loader.classList.add('hidden');
        }
    }

    function toggleMonth(monthId, headerElement) {
        const rows = document.querySelectorAll(`.row-month-${monthId}`);
        headerElement.classList.toggle('collapsed');
        rows.forEach(row => row.classList.toggle('row-hidden'));
    }

    function renderTable(listaVisualizzata, listaOriginale) {
        const corpo = document.getElementById('tabella-corpo');
        let currentMonth = "";

        const insertMonthlySummary = (label, recordsMese, monthId) => {
            const spesaMese = recordsMese.reduce((a, b) => a + (b.importototale || 0), 0);
            const litriMese = recordsMese.reduce((a, b) => a + (b.totlitri || 0), 0);
            const mediaMese = (spesaMese / (litriMese || 1)).toFixed(3);

            corpo.innerHTML += `
                <tr class="month-summary-row border-t border-white/40" onclick="toggleMonth('${monthId}', this)">
                    <td colspan="6" class="p-6">
                        <div class="flex flex-wrap items-center justify-between gap-6">
                            <div class="flex items-center gap-4">
                                <i class="fas fa-chevron-down text-slate-400 chevron-rotate"></i>
                                <span class="month-label">${label}</span>
                            </div>
                            <div class="flex flex-wrap gap-4">
                                <div class="month-pill"><span class="month-stat-label">Spesa</span><span class="month-stat-val text-blue-600">€ ${spesaMese.toFixed(2)}</span></div>
                                <div class="month-pill"><span class="month-stat-label">Litri</span><span class="month-stat-val text-emerald-600">${litriMese.toFixed(1)} L</span></div>
                                <div class="month-pill"><span class="month-stat-label">Media Periodo</span><span class="month-stat-val text-purple-600">€ ${mediaMese}</span></div>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        };

        listaVisualizzata.forEach((item) => {
            const d = new Date(item.DataRifornimento);
            const monthLabel = d.toLocaleString('it-IT', { month: 'long', year: 'numeric' });
            const monthId = d.getMonth() + "-" + d.getFullYear();
            const dataF = d.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit', year:'2-digit'});

            if (monthLabel !== currentMonth) {
                currentMonth = monthLabel;
                const recordsDelMese = listaOriginale.filter(x => 
                    new Date(x.DataRifornimento).toLocaleString('it-IT', { month: 'long', year: 'numeric' }) === monthLabel
                );
                insertMonthlySummary(monthLabel, recordsDelMese, monthId);
            }
            
            corpo.innerHTML += `
                <tr class="hover:bg-white/40 transition-colors border-b border-white/10 row-month-${monthId}">
                    <td class="p-6 text-sm font-bold text-[#243b53]">${dataF}</td>
                    <td class="p-6 text-sm font-mono text-blue-600 font-bold">${formatKM(item.kmattuali)} <span class="text-[9px] text-slate-400 font-normal ml-1 uppercase">KM</span></td>
                    <td class="p-6 text-sm text-slate-600 font-semibold">${item.totlitri} <span class="text-[9px] text-slate-400 uppercase font-normal">L</span></td>
                    <td class="p-6 text-sm font-black text-emerald-600">€ ${item.importototale?.toFixed(2)}</td>
                    <td class="p-6 text-sm font-bold text-purple-600">€ ${item.costolitro?.toFixed(3)}</td>
                    <td class="p-6 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="window.location.href='Modifica_rifornimento.html?id=${item.id}'" class="btn-mgmt btn-edit"><i class="fas fa-pencil-alt text-xs"></i></button>
                            <button onclick="elimina(${item.id})" class="btn-mgmt btn-delete"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    async function elimina(id) {
        if(confirm("Vuoi rimuovere questo rifornimento?")) {
            const { error } = await supabaseClient.from('consumi').delete().eq('id', id);
            if (!error) fetchConsumi();
        }
    }

    function renderStats(lista) {
        const container = document.getElementById('stats-container');
        if (!lista.length) return;

        const spesa = lista.reduce((a, b) => a + (b.importototale || 0), 0);
        const litri = lista.reduce((a, b) => a + (b.totlitri || 0), 0);
        const kmMax = lista[lista.length-1].kmattuali || 0;
        const kmMin = lista[0].kmattuali || 0;

        const cards = [
            { label: 'Spesa Totale', val: '€ ' + spesa.toLocaleString('it-IT', {minimumFractionDigits: 2}), color: '#3b82f6' },
            { label: 'Litri Totali', val: litri.toFixed(1) + ' L', color: '#10b981' },
            { label: 'Percorso Totale', val: formatKM(kmMax - kmMin) + ' KM', color: '#f59e0b' },
            { label: 'Media Storica', val: '€ ' + (spesa / (litri || 1)).toFixed(3), color: '#8b5cf6' }
        ];

        container.innerHTML = cards.map(c => `
            <div class="apple-glass p-7 rounded-[2rem]">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${c.label}</p>
                <h2 class="text-2xl font-black" style="color: ${c.color}">${c.val}</h2>
            </div>
        `).join('');
    }

    function exportToExcel() {
        if (!lastFetchedData || lastFetchedData.length === 0) {
            alert("Nessun dato da esportare");
            return;
        }

        const dataToExport = lastFetchedData.map(item => ({
            'Data': new Date(item.DataRifornimento).toLocaleDateString('it-IT'),
            'Chilometri Totali': Math.round(item.kmattuali),
            'Litri': item.totlitri,
            'Importo (€)': item.importototale,
            'Prezzo/Litro (€)': item.costolitro,
            'Note': item.note || ''
        }));

        const worksheet = XLSX.utils.json_to_sheet(dataToExport);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Rifornimenti");

        const dateStr = new Date().toISOString().slice(0, 10);
        XLSX.writeFile(workbook, `Meliendro_Consumi_${dateStr}.xlsx`);
    }

    window.onload = fetchConsumi;
</script>

</body>
</html>
