<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuovo Rifornimento | Meliendro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            touch-action: manipulation;
        }

        .form-card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 2rem; 
        }

        input { 
            background: #0f172a !important; 
            border: 1px solid #334155 !important; 
            color: white !important; 
            transition: 0.3s; 
            font-size: 16px !important; 
            padding: 1rem !important;
            width: 100%;
            border-radius: 0.75rem;
        }

        /* Correzione specifica per il campo DATA su iOS */
        input[type="date"] {
            min-height: 3.5rem; /* Assicura che ci sia spazio per il testo della data */
            display: flex;
            align-items: center;
        }

        input:focus { 
            border-color: #3b82f6 !important; 
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
            outline: none; 
        }

        label { 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: #94a3b8; 
            margin-bottom: 0.4rem; 
            display: block; 
        }

        .btn-large {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="p-4 flex items-start justify-center min-h-screen pt-8">

<div class="max-w-md w-full">
    <div class="text-center mb-6">
        <h1 class="text-3xl font-black text-white italic uppercase tracking-tighter">New <span class="text-blue-500">Entry</span></h1>
        <p class="text-slate-400 text-xs uppercase tracking-widest">Meliendro Log</p>
    </div>

    <div class="form-card p-6 shadow-2xl">
        <form id="rifornimentoForm" class="space-y-5">
            <div>
                <label>Data Rifornimento</label>
                <input type="date" id="DataRifornimento" required>
            </div>

            <div>
                <label>Chilometri Attuali</label>
                <input type="number" id="kmattuali" inputmode="numeric" placeholder="es. 45000" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label>Importo (€)</label>
                    <input type="number" step="0.01" id="importototale" inputmode="decimal" placeholder="50.00" required oninput="autoCalcolo('importo')">
                </div>
                <div>
                    <label>Prezzo (€/L)</label>
                    <input type="number" step="0.001" id="costolitro" inputmode="decimal" placeholder="1.750" required oninput="autoCalcolo('prezzo')">
                </div>
            </div>

            <div class="bg-slate-800/80 p-5 rounded-2xl border border-blue-500/30">
                <label class="text-blue-400">Litri Calcolati</label>
                <input type="number" step="0.01" id="totlitri" inputmode="decimal" placeholder="0.00" required class="font-black text-blue-400 text-xl" oninput="autoCalcolo('litri')">
            </div>

            <div class="pt-2 flex flex-col gap-4">
                <button type="submit" id="btnSalva" class="btn-large w-full bg-blue-600 active:bg-blue-700 text-white font-black rounded-2xl transition-all shadow-lg shadow-blue-900/40 uppercase tracking-widest text-sm">
                    <i class="fas fa-save mr-2 text-lg"></i>Salva Dati
                </button>
                
                <a href="Elenco_rifornimenti.html" class="w-full text-slate-400 text-center font-bold py-2 uppercase tracking-widest text-[10px]">
                    <i class="fas fa-times mr-1"></i> Annulla e torna indietro
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // Imposta data odierna
    document.getElementById('DataRifornimento').valueAsDate = new Date();

    function autoCalcolo(origine) {
        const importo = parseFloat(document.getElementById('importototale').value);
        const prezzo = parseFloat(document.getElementById('costolitro').value);
        const litri = parseFloat(document.getElementById('totlitri').value);

        if (origine === 'importo' || origine === 'prezzo') {
            if (importo > 0 && prezzo > 0) {
                document.getElementById('totlitri').value = (importo / prezzo).toFixed(2);
            }
        } else if (origine === 'litri') {
            if (importo > 0 && litri > 0) {
                document.getElementById('costolitro').value = (importo / litri).toFixed(3);
            }
        }
    }

    document.getElementById('rifornimentoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSalva');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>INVIO...';

        const record = {
            DataRifornimento: document.getElementById('DataRifornimento').value,
            kmattuali: parseInt(document.getElementById('kmattuali').value),
            importototale: parseFloat(document.getElementById('importototale').value),
            totlitri: parseFloat(document.getElementById('totlitri').value),
            costolitro: parseFloat(document.getElementById('costolitro').value)
        };

        try {
            const { error } = await supabaseClient
                .from('consumi')
                .insert([record]);

            if (error) throw error;
            window.location.href = 'Elenco_rifornimenti.html';
        } catch (err) {
            alert("Errore: " + err.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save mr-2"></i>Salva Dati';
        }
    });
</script>

</body>
</html>
